<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <title>Your Dad Jokes</title>
    </head>
    <body>
        <h1 class="title">YOUR<br> DAD  JOKES!</h1>
        <section class="section">
        <div class="container has-text-centered">   
            <div class="box">
                <p id="api-display" class="is-size-4">Click the button to hear a joke!</p>
            </div>
            <button id="jokeButton" class="button is-primary is-large">
                Get_Joke
            </button>
            <p class="control">
            <button id="speakButton" class="button is-arc-yellow is-large" title="Listen to joke">
                🔊AUDIO_
            </button>
            <button id="copyButton" class="button is-info is-large">
                📋COPY_LOG
            </button>
            </button>
            </p>
        </div>
         </section>
        </div>
        <div class="atari-corner">
            <div class=" streak red"></div>
            <div class=" streak orange"></div>
            <div class=" streak yellow"></div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
